<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alohomora - 英语提升工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f4f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #3d5a3d;
            margin-bottom: 10px;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        h1 img {
            height: 1em;
            display: block;
        }
        
        h1 img[src=""], h1 img:not([src]) {
            display: none;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .api-key-section {
            background: #fff9e6;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        
        .api-key-section input {
            width: calc(100% - 100px);
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            margin-top: 10px;
            margin-right: 10px;
        }
        
        .api-key-section button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        
        .api-key-section button:disabled {
            opacity: 0.5;
        }
        
        .api-key-section .btn-test {
            background: #ccc;
        }
        
        .api-key-section .btn-test.active {
            background: #ff9800;
        }
        
        .api-key-section .btn-test.active:hover {
            background: #f57c00;
        }
        
        .api-key-section.collapsed {
            padding: 10px 20px;
        }
        
        .api-key-section.collapsed .api-key-content {
            display: none;
        }
        
        .api-key-section .toggle-btn {
            background: transparent;
            color: #5a7a5a;
            padding: 5px 10px;
            margin: 0;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .api-key-section small {
            color: #666;
            display: block;
            margin-top: 5px;
        }
        
        .api-saved {
            color: #4caf50;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .upload-section {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #2196f3;
        }
        
        .upload-btn {
            background: #2196f3;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            color: white;
        }
        
        .upload-btn:hover {
            background: #1976d2;
        }
        
        .mic-btn {
            background: transparent;
            display: inline-block;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            margin: 20px auto;
            text-align: center;
            transition: all 0.3s;
            width: 80px;
            height: 80px;
            border: 3px solid transparent;
        }
        
        .mic-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        
        .mic-btn:hover {
            transform: scale(1.05);
        }
        
        .mic-btn.recording {
            border-color: #f44336;
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        input[type="file"] {
            display: none;
        }
        
        .step {
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .step.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #c8d8c8;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #7a9a7a;
        }
        
        button {
            background: #5a7a5a;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #4a6a4a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 122, 90, 0.3);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .task-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .task-card:hover {
            border-color: #7a9a7a;
            transform: translateX(5px);
        }
        
        .task-card.selected {
            border-color: #5a7a5a;
            background: #e8f0e8;
        }
        
        .task-type {
            font-weight: bold;
            color: #3d5a3d;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #5a7a5a;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #5a7a5a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .scores {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .score-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #5a7a5a;
        }
        
        .improvement {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }
        
        .reference {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }
        
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5em; }
            .scores { grid-template-columns: 1fr; }
        }
    </style>
</head>

        <!-- API Key 配置 -->
        <div class="api-key-section" id="apiKeySection">
            <strong>配置你的 API Key</strong>
            <button class="toggle-btn" id="toggleApiBtn" onclick="toggleApiSection()" style="float: right; display: none;">收起</button>
            <div class="api-key-content">
                <!-- OCR API -->
                <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0;">
                    <strong>OCR API (用于图片识别)</strong>
                    <div style="margin-top: 10px;">
                        <input type="password" id="ocrApiKey" placeholder="OCR.space API Key" oninput="onOcrKeyInput()" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px;">
                        <button onclick="testOcrKey()" class="btn-secondary btn-test" id="testOcrBtn" disabled>测试</button>
                        <button onclick="saveOcrKey()" id="saveOcrBtn">保存</button>
                        <span id="ocrSavedMsg" class="api-saved" style="display:none;">✓ 已保存</span>
                        <span id="ocrTestMsg" style="margin-left: 10px; display:none;"></span>
                    </div>
                    <small><a href="https://ocr.space/ocrapi" target="_blank">获取免费 OCR.space API Key</a></small>
                </div>
                
                <!-- LLM API -->
                <div>
                    <strong>LLM API (用于任务生成和反馈)</strong>
                    <div style="margin-top: 10px;">
                        <select id="apiProvider" style="width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                            <option value="groq">Groq API</option>
                            <option value="grok">Grok (X.AI)</option>
                            <option value="openai">OpenAI</option>
                        </select>
                        <input type="password" id="apiKeyInput" placeholder="输入你的 LLM API Key" oninput="onApiKeyInput()" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px;">
                        <button onclick="testApiKey()" class="btn-secondary btn-test" id="testBtn" disabled>测试</button>
                        <button onclick="saveApiKey()" id="saveBtn">保存</button>
                        <span id="apiSavedMsg" class="api-saved" style="display:none;">✓ 已保存</span>
                        <span id="apiTestMsg" style="margin-left: 10px; display:none;"></span>

                </div>

        <!-- Step 1: 输入中文 -->
        <div id="step1" class="step active">
            <div class="step-title">步骤 1: 输入中文内容</div>
            
            <!-- 上传截图 -->
            <div class="upload-section">
                <strong>上传截图（自动识别文字）</strong>
                <label for="imageUpload" class="upload-btn">选择图片</label>
                <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
                <div id="uploadStatus" style="margin-top: 10px; color: #666;"></div>
            </div>
            
            <!-- 或直接粘贴 -->
            <div style="text-align: center; margin: 15px 0; color: #999;">或</div>
            
            <textarea id="chineseInput" placeholder="直接粘贴中文内容...&#10;&#10;例如：今天看了一部超好看的电影，讲的是一个程序员通过时间旅行改变了自己的命运。剧情紧凑，演员演技在线，强烈推荐！"></textarea>
            <button onclick="generateTasks()">生成训练任务 →</button>
        </div>
        
        <!-- Step 2: 选择任务 -->
        <div id="step2" class="step">
            <div class="step-title">步骤 2: 选择一个任务</div>
            <div id="tasksList"></div>
            <button onclick="startOutput()" id="startBtn" disabled>开始输出 →</button>
            <button class="btn-secondary" onclick="goToStep(1)">← 返回</button>
        </div>
        
        <!-- Step 3: 完成输出 -->

    <script>
        let apiKey = localStorage.getItem('api_key') || '';
        let apiProvider = localStorage.getItem('api_provider') || 'groq';
        let ocrApiKey = localStorage.getItem('ocr_api_key') || '';
        let chineseText = '';
        let tasks = [];
        let selectedTask = null;
        
        // 加载保存的 API Key
        if (apiKey) {
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('apiSavedMsg').style.display = 'inline';
            document.getElementById('testBtn').disabled = false;
            document.getElementById('testBtn').classList.add('active');
        }
        if (apiProvider) {
            document.getElementById('apiProvider').value = apiProvider;
        }
        if (ocrApiKey) {
            document.getElementById('ocrApiKey').value = ocrApiKey;
            document.getElementById('ocrSavedMsg').style.display = 'inline';
            document.getElementById('testOcrBtn').disabled = false;
            document.getElementById('testOcrBtn').classList.add('active');
        }
        if (apiKey || ocrApiKey) {
            document.getElementById('toggleApiBtn').style.display = 'inline-block';
        }
        
        // API Key 输入时启用测试按钮
        function onApiKeyInput() {
            const input = document.getElementById('apiKeyInput').value.trim();
            const testBtn = document.getElementById('testBtn');
            if (input) {
                testBtn.disabled = false;
                testBtn.classList.add('active');
            } else {
                testBtn.disabled = true;
                testBtn.classList.remove('active');
            }
        }
        
        function onOcrKeyInput() {
            const input = document.getElementById('ocrApiKey').value.trim();
            const testBtn = document.getElementById('testOcrBtn');
            if (input) {
                testBtn.disabled = false;
                testBtn.classList.add('active');
            } else {
                testBtn.disabled = true;
                testBtn.classList.remove('active');
            }
        }
        
        // 折叠/展开 API 配置区域
        function toggleApiSection() {
            const section = document.getElementById('apiKeySection');
            const btn = document.getElementById('toggleApiBtn');
            section.classList.toggle('collapsed');
            btn.textContent = section.classList.contains('collapsed') ? '展开' : '收起';
        }
        
        // 测试 API Key
        async function testApiKey() {
            const testKey = document.getElementById('apiKeyInput').value.trim();
            const testProvider = document.getElementById('apiProvider').value;
            const msgSpan = document.getElementById('apiTestMsg');
            
            if (!testKey) {
                alert('请先输入 API Key');
                return;
            }
            
            msgSpan.textContent = '测试中...';
            msgSpan.style.color = '#666';
            msgSpan.style.display = 'inline';
            
            try {
                let url, body;
                
                if (testProvider === 'groq') {
                    url = 'https://api.groq.com/openai/v1/chat/completions';
                    body = {
                        model: 'llama-3.3-70b-versatile',
                        messages: [{ role: 'user', content: 'Say hello' }],
                        max_tokens: 10
                    };
                } else if (testProvider === 'grok') {
                    url = 'https://api.x.ai/v1/chat/completions';
                    body = {
                        model: 'grok-beta',
                        messages: [{ role: 'user', content: 'Say hello' }],
                        max_tokens: 10
                    };
                } else {
                    url = 'https://api.openai.com/v1/chat/completions';
                    body = {
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: 'Say hello' }],
                        max_tokens: 10
                    };
                }
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${testKey}`
                    },
                    body: JSON.stringify(body)
                });
                
                if (response.ok) {
                    msgSpan.textContent = '✓ API Key 有效';
                    msgSpan.style.color = '#4caf50';
                    document.getElementById('toggleApiBtn').style.display = 'inline-block';
                    setTimeout(() => msgSpan.style.display = 'none', 3000);
                } else {
                    const error = await response.json().catch(() => ({}));
                    msgSpan.textContent = '✗ ' + (error.error?.message || 'API Key 无效');
                    msgSpan.style.color = '#f44336';
                }
            } catch (error) {
                msgSpan.textContent = '✗ 测试失败: ' + error.message;
                msgSpan.style.color = '#f44336';
            }
        }
        
        // 保存 API Key
        function saveApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            apiProvider = document.getElementById('apiProvider').value;
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }
            localStorage.setItem('api_key', apiKey);
            localStorage.setItem('api_provider', apiProvider);
            const msg = document.getElementById('apiSavedMsg');
            msg.style.display = 'inline';
            document.getElementById('toggleApiBtn').style.display = 'inline-block';
        }
        
        function saveOcrKey() {
            ocrApiKey = document.getElementById('ocrApiKey').value.trim();
            if (!ocrApiKey) {
                alert('请输入 OCR API Key');
                return;
            }
            localStorage.setItem('ocr_api_key', ocrApiKey);
            const msg = document.getElementById('ocrSavedMsg');
            msg.style.display = 'inline';
            document.getElementById('toggleApiBtn').style.display = 'inline-block';
        }
        
        async function testOcrKey() {
            const testKey = document.getElementById('ocrApiKey').value.trim();
            const msgSpan = document.getElementById('ocrTestMsg');
            
            if (!testKey) {
                alert('请先输入 OCR API Key');
                return;
            }
            
            msgSpan.textContent = '测试中...';
            msgSpan.style.color = '#666';
            msgSpan.style.display = 'inline';
            
            try {
                // 使用 base64 编码的测试图片（简单的 "Test" 文字图片）
                const testImageBase64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAFUlEQVR42mNk+M9Qz0AEYBxVSF+FABJADveWkH6oAAAAAElFTkSuQmCC';
                
                const formData = new FormData();
                formData.append('base64Image', testImageBase64);
                formData.append('language', 'eng');
                
                const response = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    headers: {
                        'apikey': testKey
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.OCRExitCode === 1 || data.IsErroredOnProcessing === false) {
                    msgSpan.textContent = '✓ API Key 有效';
                    msgSpan.style.color = '#4caf50';
                    setTimeout(() => msgSpan.style.display = 'none', 3000);
                } else {
                    msgSpan.textContent = '✗ ' + (data.ErrorMessage || 'API Key 无效');
                    msgSpan.style.color = '#f44336';
                }
            } catch (error) {
                msgSpan.textContent = '✗ 测试失败: ' + error.message;
                msgSpan.style.color = '#f44336';
            }
        }
        
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
        
        function showLoading() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('loading').classList.add('active');
        }
        
        async function callAPI(prompt) {
            if (!apiKey) {
                alert('请先配置并保存 API Key');
                return null;
            }
            
            try {
                let url, body;
                
                if (apiProvider === 'groq') {
                    url = 'https://api.groq.com/openai/v1/chat/completions';
                    body = {
                        model: 'llama-3.3-70b-versatile',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.7,
                        max_tokens: 2000
                    };
                } else if (apiProvider === 'grok') {
                    url = 'https://api.x.ai/v1/chat/completions';
                    body = {
                        model: 'grok-beta',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    };
                } else { // openai
                    url = 'https://api.openai.com/v1/chat/completions';
                    body = {
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.7,
                        max_tokens: 2000
                    };
                }
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(body)
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('API Error:', errorData);
                    throw new Error(
                        errorData.error?.message || 
                        `API 调用失败 (${response.status})。请检查：\n1. API Key 是否正确\n2. 是否有足够的额度\n3. 网络连接是否正常`
                    );
                }
                
                const data = await response.json();
                if (!data.choices || !data.choices[0]) {
                    throw new Error('API 返回数据格式错误');
                }
                
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Call Error:', error);
                throw error;
            }
        }
        
        // 处理图片上传和 OCR
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!ocrApiKey) {
                alert('请先配置并保存 OCR API Key');
                return;
            }
            
            const status = document.getElementById('uploadStatus');
            status.textContent = '正在识别文字...';
            status.style.color = '#666';
            
            try {
                // 使用 OCR.space API
                const formData = new FormData();
                formData.append('file', file);
                formData.append('language', 'chs');
                formData.append('isOverlayRequired', 'false');
                
                const response = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    headers: {
                        'apikey': ocrApiKey
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.OCRExitCode === 1 && data.ParsedResults && data.ParsedResults.length > 0) {
                    const text = data.ParsedResults[0].ParsedText;
                    document.getElementById('chineseInput').value = text;
                    status.textContent = '✓ 识别完成！';
                    status.style.color = '#4caf50';
                } else {
                    throw new Error(data.ErrorMessage || 'OCR 识别失败');
                }
            } catch (error) {
                console.error('OCR Error:', error);
                status.textContent = '识别失败: ' + error.message;
                status.style.color = '#f44336';
            }
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        async function generateTasks() {
            chineseText = document.getElementById('chineseInput').value.trim();
            if (!chineseText) {
                alert('请输入中文内容');
                return;
            }
            
            if (!apiKey) {
                alert('请先配置并保存 API Key');
                return;
            }
            
            showLoading();
            
            try {
                const prompt = `请基于以下中文内容生成3种英语训练任务。

中文内容：
${chineseText}

请生成：
1. Retell（口语复述）- 3-5个要点
2. Rewrite（写作改写）- 3-5个要点  
3. Style Shift（语域切换）- 3-5个要点和目标语域

严格按照以下JSON格式返回，不要添加任何其他文字：
{
  "retell": {"key_points": ["要点1", "要点2", "要点3"]},
  "rewrite": {"key_points": ["要点1", "要点2", "要点3"]},
  "style_shift": {"key_points": ["要点1", "要点2", "要点3"], "target_register": "professional"}
}`;
                
                const response = await callAPI(prompt);
                
                // 提取JSON（处理可能的markdown代码块）
                let jsonStr = response.trim();
                if (jsonStr.startsWith('```')) {
                    jsonStr = jsonStr.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                }
                
                const data = JSON.parse(jsonStr);
                
                tasks = [
                    { task_type: 'retell', ...data.retell },
                    { task_type: 'rewrite', ...data.rewrite },
                    { task_type: 'style_shift', ...data.style_shift }
                ];
                
                displayTasks();
                goToStep(2);
            } catch (error) {
                console.error('Generate tasks error:', error);
                alert('生成任务失败: ' + error.message);
                goToStep(1);
            }
        }
        
        function displayTasks() {
            const tasksList = document.getElementById('tasksList');
            const taskNames = {
                'retell': 'Retell (口语复述)',
                'rewrite': 'Rewrite (写作改写)',
                'style_shift': 'Style Shift (语域切换)'
            };
            
            const taskDescriptions = {
                'retell': '用自己的话口语复述中文内容',
                'rewrite': '用英文改写中文内容',
                'style_shift': '用不同语域风格表达中文内容'
            };
            
            tasksList.innerHTML = tasks.map((task, index) => `
                <div class="task-card" onclick="selectTask(${index})">
                    <div class="task-type">${taskNames[task.task_type]}</div>
                    <div style="color: #666; margin-bottom: 8px;">${taskDescriptions[task.task_type]}</div>
                    <div class="task-points">
                        要点: ${task.key_points.slice(0, 3).join(', ')}...
                    </div>
                </div>
            `).join('');
        }
        
        function selectTask(index) {
            selectedTask = tasks[index];
            document.querySelectorAll('.task-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });
            startOutput();
        }
        
        function startOutput() {
            if (!selectedTask) return;
            
            const taskInfo = document.getElementById('taskInfo');
            let taskContent = `<strong>任务类型:</strong> ${selectedTask.task_type}<br>`;
            
            // 所有任务都显示中文全文
            taskContent += `<strong>中文原文:</strong><br><div style="background: white; padding: 10px; border-radius: 5px; margin: 10px 0;">${chineseText}</div>`;
            
            taskContent += `<strong>要覆盖的要点:</strong><br>
                ${selectedTask.key_points.map(p => `• ${p}`).join('<br>')}`;
            
            taskInfo.innerHTML = taskContent;
            
            // 如果是 Retell 任务，显示录音按钮
            const voiceSection = document.getElementById('voiceInputSection');
            if (selectedTask.task_type === 'retell') {
                voiceSection.style.display = 'block';
            } else {
                voiceSection.style.display = 'none';
            }
            
            goToStep(3);
        }
        
        // 录音功能
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        
        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await transcribeAudio(audioBlob);
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    
                    document.getElementById('micBtn').classList.add('recording');
                    document.getElementById('recordingStatus').textContent = '正在录音...点击停止';
                } catch (error) {
                    alert('无法访问麦克风: ' + error.message);
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('recordingStatus').textContent = '正在转写...';
            }
        }
        
        async function transcribeAudio(audioBlob) {
            try {
                const formData = new FormData();
                formData.append('file', audioBlob, 'recording.webm');
                formData.append('model', 'whisper-large-v3');
                
                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('转写失败');
                }
                
                const data = await response.json();
                document.getElementById('englishOutput').value = data.text;
                document.getElementById('recordingStatus').textContent = '✓ 转写完成！';
                document.getElementById('recordingStatus').style.color = '#4caf50';
            } catch (error) {
                document.getElementById('recordingStatus').textContent = '转写失败: ' + error.message;
                document.getElementById('recordingStatus').style.color = '#f44336';
            }
        }
        
        async function submitOutput() {
            const outputText = document.getElementById('englishOutput').value.trim();
            if (!outputText) {
                alert('请输入你的英文输出');
                return;
            }
            
            showLoading();
            
            try {
                const prompt = `请评估以下英文输出并提供反馈。

原始中文：${chineseText}
任务类型：${selectedTask.task_type}
任务要点：${selectedTask.key_points.join(', ')}

用户输出：
${outputText}

请提供：
1. Top 3改进点（issue, suggestion, reason）
2. 参考版本1（贴近用户风格）
3. 参考版本2（简洁专业）
4. 评分（1-10分）：naturalness, clarity, conciseness, register_control

严格按照以下JSON格式返回，不要添加任何其他文字：
{
  "top_improvements": [
    {"issue": "问题描述", "suggestion": "建议改法", "reason": "原因"},
    {"issue": "问题描述", "suggestion": "建议改法", "reason": "原因"},
    {"issue": "问题描述", "suggestion": "建议改法", "reason": "原因"}
  ],
  "reference_version_1": "参考版本1",
  "reference_version_2": "参考版本2",
  "overall_scores": {"naturalness": 7, "clarity": 8, "conciseness": 6, "register_control": 7}
}`;
                
                const response = await callAPI(prompt);
                
                // 提取JSON
                let jsonStr = response.trim();
                if (jsonStr.startsWith('```')) {
                    jsonStr = jsonStr.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                }
                
                const feedback = JSON.parse(jsonStr);
                
                displayFeedback(feedback);
                goToStep(4);
            } catch (error) {
                console.error('Submit output error:', error);
                alert('获取反馈失败: ' + error.message);
                goToStep(3);
            }
        }
        
        function displayFeedback(feedback) {
            const content = document.getElementById('feedbackContent');
            
            const scoresHtml = `
                <div class="scores">
                    <div class="score-item">
                        <div class="score-label">自然度</div>
                        <div class="score-value">${feedback.overall_scores.naturalness}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">清晰度</div>
                        <div class="score-value">${feedback.overall_scores.clarity}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">简洁度</div>
                        <div class="score-value">${feedback.overall_scores.conciseness}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">语域控制</div>
                        <div class="score-value">${feedback.overall_scores.register_control}/10</div>
                    </div>
                </div>
            `;
            
            const improvementsHtml = feedback.top_improvements.map((imp, i) => `
                <div class="improvement">
                    <div class="improvement-title">${i + 1}. ${imp.issue}</div>
                    <div><strong>建议:</strong> ${imp.suggestion}</div>
                    <div><strong>原因:</strong> ${imp.reason}</div>
                </div>
            `).join('');
            
            const referencesHtml = `
                <div class="reference">
                    <div class="reference-title">参考版本 1 (贴近你的风格)</div>
                    <div>${feedback.reference_version_1}</div>
                </div>
                <div class="reference">
                    <div class="reference-title">参考版本 2 (更简洁专业)</div>
                    <div>${feedback.reference_version_2}</div>
                </div>
            `;
            
            content.innerHTML = scoresHtml + '<h3>Top 3 改进点</h3>' + improvementsHtml + referencesHtml;
        }
    </script>
</body>
</html>
