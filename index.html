<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alohomora - 英语提升工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .api-key-section {
            background: #fff9e6;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        
        .api-key-section input {
            width: calc(100% - 100px);
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            margin-top: 10px;
            margin-right: 10px;
        }
        
        .api-key-section button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        
        .api-key-section small {
            color: #666;
            display: block;
            margin-top: 5px;
        }
        
        .api-saved {
            color: #4caf50;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .upload-section {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #2196f3;
        }
        
        .upload-btn {
            background: #2196f3;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .upload-btn:hover {
            background: #1976d2;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .step {
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .step.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .task-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .task-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .task-card.selected {
            border-color: #667eea;
            background: #e8ebff;
        }
        
        .task-type {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .scores {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .score-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .improvement {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }
        
        .reference {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }
        
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5em; }
            .scores { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Alohomora</h1>
        <p class="subtitle">把中文内容转化为英语训练</p>
        
        <!-- API Key 配置 -->
        <div class="api-key-section" id="apiKeySection">
            <strong>⚙️ 配置你的 API Key</strong>
            <div>
                <input type="password" id="apiKeyInput" placeholder="输入你的 Grok API Key (xai-...)">
                <button onclick="saveApiKey()">保存</button>
                <span id="apiSavedMsg" class="api-saved" style="display:none;">✓ 已保存</span>
            </div>
            <small>
                没有 API Key? 
                <a href="https://console.x.ai/" target="_blank">点击获取 Grok API Key</a> 或 
                <a href="https://platform.openai.com/" target="_blank">OpenAI API Key</a>
            </small>
            <small>你的 API Key 只保存在浏览器本地，不会上传到任何服务器</small>
        </div>
        
        <!-- Step 1: 输入中文 -->
        <div id="step1" class="step active">
            <div class="step-title">📝 步骤 1: 输入中文内容</div>
            
            <!-- 上传截图 -->
            <div class="upload-section">
                <strong>📸 上传截图（自动识别文字）</strong>
                <label for="imageUpload" class="upload-btn">选择图片</label>
                <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
                <div id="uploadStatus" style="margin-top: 10px; color: #666;"></div>
            </div>
            
            <!-- 或直接粘贴 -->
            <div style="text-align: center; margin: 15px 0; color: #999;">或</div>
            
            <textarea id="chineseInput" placeholder="直接粘贴中文内容...&#10;&#10;例如：今天看了一部超好看的电影，讲的是一个程序员通过时间旅行改变了自己的命运。剧情紧凑，演员演技在线，强烈推荐！"></textarea>
            <button onclick="generateTasks()">生成训练任务 →</button>
        </div>
        
        <!-- Step 2: 选择任务 -->
        <div id="step2" class="step">
            <div class="step-title">🎲 步骤 2: 选择一个任务</div>
            <div id="tasksList"></div>
            <button onclick="startOutput()" id="startBtn" disabled>开始输出 →</button>
            <button class="btn-secondary" onclick="goToStep(1)">← 返回</button>
        </div>
        
        <!-- Step 3: 完成输出 -->
        <div id="step3" class="step">
            <div class="step-title">✍️ 步骤 3: 用英文完成任务</div>
            <div id="taskInfo" style="background: #f8f9ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;"></div>
            <textarea id="englishOutput" placeholder="用英文完成这个任务..."></textarea>
            <button onclick="submitOutput()">获取反馈 →</button>
            <button class="btn-secondary" onclick="goToStep(2)">← 返回</button>
        </div>
        
        <!-- Step 4: 查看反馈 -->
        <div id="step4" class="step">
            <div class="step-title">🤖 步骤 4: AI 教练反馈</div>
            <div id="feedbackContent"></div>
            <button onclick="goToStep(1)">开始新练习</button>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="step">
            <div class="loading">
                <div class="spinner"></div>
                <div>AI 正在处理中...</div>
            </div>
        </div>
    </div>
    
    <script>
        let apiKey = localStorage.getItem('grok_api_key') || '';
        let chineseText = '';
        let tasks = [];
        let selectedTask = null;
        
        // 加载保存的 API Key
        if (apiKey) {
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('apiSavedMsg').style.display = 'inline';
        }
        
        // 保存 API Key
        function saveApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }
            localStorage.setItem('grok_api_key', apiKey);
            const msg = document.getElementById('apiSavedMsg');
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
        
        function showLoading() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('loading').classList.add('active');
        }
        
        async function callGrokAPI(prompt) {
            if (!apiKey) {
                alert('请先配置并保存 API Key');
                return null;
            }
            
            const response = await fetch('https://api.x.ai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'grok-beta',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 调用失败，请检查 API Key 是否正确');
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
        }
        
        // 处理图片上传和 OCR
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const status = document.getElementById('uploadStatus');
            status.textContent = '正在识别文字...';
            
            try {
                // 将图片转为 base64
                const base64 = await fileToBase64(file);
                
                // 使用 Grok Vision API 识别文字
                const prompt = '请识别图片中的所有中文文字，只返回文字内容，不要添加任何解释。';
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'grok-vision-beta',
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'text', text: prompt },
                                { type: 'image_url', image_url: { url: base64 } }
                            ]
                        }],
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) {
                    throw new Error('OCR 识别失败');
                }
                
                const data = await response.json();
                const text = data.choices[0].message.content;
                
                document.getElementById('chineseInput').value = text;
                status.textContent = '✓ 识别完成！';
                status.style.color = '#4caf50';
            } catch (error) {
                status.textContent = '识别失败: ' + error.message;
                status.style.color = '#f44336';
            }
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        async function generateTasks() {
            chineseText = document.getElementById('chineseInput').value.trim();
            if (!chineseText) {
                alert('请输入中文内容');
                return;
            }
            
            showLoading();
            
            try {
                const prompt = `你是一位专业的英语教学设计师。用户提供了一段中文内容，你需要基于这段内容生成 3 种训练任务。

中文内容：
${chineseText}

请生成以下 3 种任务：
1. Retell（口语复述）- 提供 3-5 个必须覆盖的要点
2. Rewrite（写作改写）- 提供 3-5 个必须覆盖的要点
3. Style Shift（语域切换）- 指定目标语域并提供要点

以 JSON 格式返回：
{
  "retell": {"key_points": ["point1", "point2", ...]},
  "rewrite": {"key_points": ["point1", "point2", ...]},
  "style_shift": {"key_points": ["point1", "point2", ...], "target_register": "professional"}
}`;
                
                const response = await callGrokAPI(prompt);
                const data = JSON.parse(response);
                
                tasks = [
                    { task_type: 'retell', ...data.retell },
                    { task_type: 'rewrite', ...data.rewrite },
                    { task_type: 'style_shift', ...data.style_shift }
                ];
                
                displayTasks();
                goToStep(2);
            } catch (error) {
                alert('生成任务失败: ' + error.message);
                goToStep(1);
            }
        }
        
        function displayTasks() {
            const tasksList = document.getElementById('tasksList');
            const taskNames = {
                'retell': '🗣️ Retell (口语复述)',
                'rewrite': '✍️ Rewrite (写作改写)',
                'style_shift': '🎭 Style Shift (语域切换)'
            };
            
            tasksList.innerHTML = tasks.map((task, index) => `
                <div class="task-card" onclick="selectTask(${index})">
                    <div class="task-type">${taskNames[task.task_type]}</div>
                    <div class="task-points">
                        要点: ${task.key_points.slice(0, 3).join(', ')}...
                    </div>
                </div>
            `).join('');
        }
        
        function selectTask(index) {
            selectedTask = tasks[index];
            document.querySelectorAll('.task-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });
            document.getElementById('startBtn').disabled = false;
        }
        
        function startOutput() {
            if (!selectedTask) return;
            
            const taskInfo = document.getElementById('taskInfo');
            taskInfo.innerHTML = `
                <strong>任务类型:</strong> ${selectedTask.task_type}<br>
                <strong>要覆盖的要点:</strong><br>
                ${selectedTask.key_points.map(p => `• ${p}`).join('<br>')}
            `;
            
            goToStep(3);
        }
        
        async function submitOutput() {
            const outputText = document.getElementById('englishOutput').value.trim();
            if (!outputText) {
                alert('请输入你的英文输出');
                return;
            }
            
            showLoading();
            
            try {
                const prompt = `你是一位经验丰富的英语教练。用户完成了一个英文输出任务，你需要提供精准、可操作的反馈。

原始中文内容：
${chineseText}

任务类型：${selectedTask.task_type}
任务要点：${selectedTask.key_points.join(', ')}

用户输出：
${outputText}

请提供：
1. Top 3 改进点（每个包含：issue, suggestion, reason）
2. 参考版本 1（贴近用户风格但更地道）
3. 参考版本 2（更 concise/professional）
4. 整体评分（naturalness, clarity, conciseness, register_control，1-10分）

以 JSON 格式返回：
{
  "top_improvements": [{"issue": "...", "suggestion": "...", "reason": "..."}, ...],
  "reference_version_1": "...",
  "reference_version_2": "...",
  "overall_scores": {"naturalness": 7, "clarity": 8, "conciseness": 6, "register_control": 7}
}`;
                
                const response = await callGrokAPI(prompt);
                const feedback = JSON.parse(response);
                
                displayFeedback(feedback);
                goToStep(4);
            } catch (error) {
                alert('获取反馈失败: ' + error.message);
                goToStep(3);
            }
        }
        
        function displayFeedback(feedback) {
            const content = document.getElementById('feedbackContent');
            
            const scoresHtml = `
                <div class="scores">
                    <div class="score-item">
                        <div class="score-label">自然度</div>
                        <div class="score-value">${feedback.overall_scores.naturalness}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">清晰度</div>
                        <div class="score-value">${feedback.overall_scores.clarity}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">简洁度</div>
                        <div class="score-value">${feedback.overall_scores.conciseness}/10</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">语域控制</div>
                        <div class="score-value">${feedback.overall_scores.register_control}/10</div>
                    </div>
                </div>
            `;
            
            const improvementsHtml = feedback.top_improvements.map((imp, i) => `
                <div class="improvement">
                    <div class="improvement-title">${i + 1}. ${imp.issue}</div>
                    <div><strong>建议:</strong> ${imp.suggestion}</div>
                    <div><strong>原因:</strong> ${imp.reason}</div>
                </div>
            `).join('');
            
            const referencesHtml = `
                <div class="reference">
                    <div class="reference-title">✨ 参考版本 1 (贴近你的风格)</div>
                    <div>${feedback.reference_version_1}</div>
                </div>
                <div class="reference">
                    <div class="reference-title">💼 参考版本 2 (更简洁专业)</div>
                    <div>${feedback.reference_version_2}</div>
                </div>
            `;
            
            content.innerHTML = scoresHtml + '<h3>🎯 Top 3 改进点</h3>' + improvementsHtml + referencesHtml;
        }
    </script>
</body>
</html>
